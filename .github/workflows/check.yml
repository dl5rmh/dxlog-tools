name: Check C# Scripts

on:
  workflow_dispatch:
  push:
    paths:
      - 'Scripts/**/*.cs'
  pull_request:
    paths:
      - 'Scripts/**/*.cs'

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run syntax & rule checks
        run: dotnet run --project .github/scripts/CheckScripts
